name: 24/7 Job Scout Automation

on:
  schedule:
    - cron: '0 * * * *'  # Har ghante khud-ba-khud chalega
  workflow_dispatch:      # Manual trigger karne ke liye button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install firebase-admin requests

      - name: Run Job Scout Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # GitHub Secret se secure json file banana
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > serviceAccountKey.json
          
          # 🔥 FIX: Ab robot seedhe bahar rakhi hui file ko run karega
          python fetch_jobs.py
